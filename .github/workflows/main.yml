# =========================================================================================
# ACEest Fitness & Gym – Automated CI/CD Pipeline via GitHub Actions
# Triggers: The pipeline must be triggered by every push or pull_request
#
# Jobs (in order):
#   1. build-lint          – compile the application and check for syntax errors
#   2. docker-assembly     – assemble the Docker container image
#   3. auto-test           – execute the Pytest suite inside the containerized environment
# =========================================================================================

name: ACEest Fitness & Gym CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ----------------------------------------------------------
  # Job 1: Build & Lint
  # Compile the application and check for syntax errors.
  # ----------------------------------------------------------
  build-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

#      - name: Install dependencies
#        run: pip install -r requirements.txt

#      - name: Run Test cases
#        run: pytest tests.py

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-tk  # Required for Tkinter on Linux
          pip install -r requirements.txt

      - name: Run Test cases
        run: xvfb-run pytest tests.py  # xvfb-run creates the virtual $DISPLAY


  # ----------------------------------------------------------
  # Job 2: Docker Image Assembly
  # Build the Docker container image from Dockerfile.
  # ----------------------------------------------------------
  docker-assembly:
    name: Docker Image Assembly
    runs-on: ubuntu-latest
    needs: build-lint

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t aceest-fitness-gym:${{ github.sha }} \
            -t aceest-fitness-gym:latest \
            .

      - name: Verify Docker image was created
        run: docker images aceest-fitness-gym

  # ----------------------------------------------------------
  # Job 3: Automated Testing (inside the Docker container)
  # Runs Pytest suite INSIDE the containerized environment
  # to confirm stability, per assignment requirement.
  # ----------------------------------------------------------
  auto-test:
    name: Automated Testing (Containerized)
    runs-on: ubuntu-latest
    needs: build-lint

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image for testing
        run: docker build -t aceest-fitness-gym:test .

      - name: Run Pytest suite inside Docker container with Xvfb
        timeout-minutes: 3
        run: |
          docker run --rm --init\
            aceest-fitness-gym:test \
            xvfb-run python -m pytest tests.py

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/
